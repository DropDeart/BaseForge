name: publish

# nuget.org'a Trusted Publishing (OIDC) ile yayın.
# Tetik: GitHub'da bir Release "published" olduğunda; ya da elle (workflow_dispatch).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write   # nuget.org OIDC token değişimi için zorunlu
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # services/BaseForge.Identity.Web/dist gitignore'lu ve BaseForge.CodeGen.csproj'un
      # BuildIdentityWeb target'ı bunu otomatik build ETMİYOR (dotnet pack'in çoklu geçişleri
      # arasında race condition'ı önlemek için bilinçli tasarım — bkz. csproj'daki yorum).
      # Bu yüzden CI'da önceden elle build edilmesi gerekiyor, aksi halde "'dist' bulunamadı" hatası.
      # `npm install` (npm ci DEĞİL): bu paketin lockfile'ı Windows/Linux arasında optional/
      # platform-specific alt bağımlılıklar (örn. @emnapi/*) yüzünden kararsız — hangi platformda
      # `npm install` çalıştırılırsa lockfile o platforma göre değişiyor. `npm ci`'nin sıkı
      # lockfile-senkron kontrolü bu yüzden platformlar arası sürekli kırılıyor; `npm install`
      # bağımlılıkları CI'nın kendi platformunda taze çözer, bu sınıf soruna tamamen bağışık.
      - name: Build Identity.Web (BaseForge.CodeGen'in embed ettiği ortak giriş SPA'sı)
        run: |
          cd services/BaseForge.Identity.Web
          npm install
          npm run build

      - name: Compute version
        id: ver
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"          # 'v0.1.0' -> '0.1.0'
          if [ -z "$VERSION" ]; then VERSION="0.1.0-alpha"; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Yayınlanacak sürüm: $VERSION"

      - name: Restore
        run: dotnet restore BaseForge.slnx

      - name: Build
        run: dotnet build BaseForge.slnx -c Release --no-restore -p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test BaseForge.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack BaseForge.slnx -c Release --no-build -o artifacts -p:Version=${{ steps.ver.outputs.version }}

      - name: NuGet login (OIDC -> geçici API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: CNRSoft

      - name: Push
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
