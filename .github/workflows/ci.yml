name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      RUN_DB_TESTS: "1"   # ubuntu runner'da Docker var → Testcontainers (gerçek Postgres) testleri açık
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # services/BaseForge.Identity.Web/dist gitignore'lu ve BaseForge.CodeGen.csproj'un
      # BuildIdentityWeb target'ı bunu otomatik build ETMİYOR (dotnet pack'in çoklu geçişleri
      # arasında race condition'ı önlemek için bilinçli tasarım — bkz. csproj'daki yorum).
      # Bu yüzden CI'da önceden elle build edilmesi gerekiyor, aksi halde "'dist' bulunamadı" hatası.
      - name: Build Identity.Web (BaseForge.CodeGen'in embed ettiği ortak giriş SPA'sı)
        run: |
          cd services/BaseForge.Identity.Web
          npm ci
          npm run build

      - name: Restore
        run: dotnet restore BaseForge.slnx

      - name: Build
        run: dotnet build BaseForge.slnx -c Release --no-restore

      - name: Test
        run: dotnet test BaseForge.slnx -c Release --no-build --verbosity normal
