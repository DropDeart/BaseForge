name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      RUN_DB_TESTS: "1"   # ubuntu runner'da Docker var → Testcontainers (gerçek Postgres) testleri açık
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BaseForge.slnx

      - name: Build
        run: dotnet build BaseForge.slnx -c Release --no-restore

      - name: Test
        run: dotnet test BaseForge.slnx -c Release --no-build --verbosity normal
