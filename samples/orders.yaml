# BaseForge örnek servis spec'i — Orders (sipariş).
# Üret:  baseforge new-service --spec samples/orders.yaml --output services/BaseForge.Orders
# NOT: samples/products.yaml ile aynı klasörde olduğundan Product dış referansı kardeş spec
# üzerinden zengin çözümlenir; User dış referansı Identity'nin sabit (ApplicationUser) şekliyle
# özel olarak çözümlenir (bkz. src/BaseForge.CodeGen/Generation/CodeGenerator.cs).
service: orders
database: orders_db

entities:
  Order:
    props:
      status: string
      total: decimal
      placedAt: datetime
    relations:
      items:
        kind: one-to-many
        target: OrderItem          # servis içi ilişki -> gerçek FK
    externalRefs:
      user:
        target: identity/User      # merkez entity — siparişi veren kullanıcı
        store: UserId
        via: grpc

  OrderItem:
    props:
      quantity: int
      unitPrice: decimal
    relations:
      order:
        kind: many-to-one
        target: Order
    externalRefs:
      product:
        target: products/Product
        store: ProductId
        via: grpc

# Merkez Identity'ye JWT ile bağlı — yetkisiz kullanıcı sipariş oluşturamaz.
auth:
  authority: http://localhost:5090
  audience: baseforge-api
  requireHttpsMetadata: false
  protect: true
