# BaseForge örnek servis spec'i — Warehouse (depo/stok takibi).
# Üret:  baseforge new-service --spec samples/warehouse.yaml --output services/BaseForge.Warehouse
# NOT: samples/products.yaml ile aynı klasörde olduğundan, Product dış referansı kardeş spec
# üzerinden çözümlenir (gerçek alanlarla: name/description/price/stock).
service: warehouse
database: warehouse_db

entities:
  StockItem:
    props:
      quantity: int
      location: string
    externalRefs:
      product:
        target: products/Product
        store: ProductId
        via: grpc

auth:
  authority: http://localhost:5090
  audience: baseforge-api
  requireHttpsMetadata: false
  protect: true
