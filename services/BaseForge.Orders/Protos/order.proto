syntax = "proto3";

option csharp_namespace = "Orders.Grpc";

package orders;

// BaseForge.CodeGen tarafından üretildi — Order entity'sine diğer servislerin
// salt-okunur gRPC erişimi. Servis adı (OrderService), C# implementasyon sınıfıyla
// (OrderGrpcService) çakışmasın diye ayrı tutulur.
service OrderService {
  rpc GetById (OrderByIdRequest) returns (OrderMessage);
}

message OrderByIdRequest {
  string id = 1;
}

message OrderMessage {
  string id = 1;
  string status = 2;
  string total = 3;
  string placed_at = 4;
}
