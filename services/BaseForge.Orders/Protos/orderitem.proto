syntax = "proto3";

option csharp_namespace = "Orders.Grpc";

package orders;

// BaseForge.CodeGen tarafından üretildi — OrderItem entity'sine diğer servislerin
// salt-okunur gRPC erişimi. Servis adı (OrderItemService), C# implementasyon sınıfıyla
// (OrderItemGrpcService) çakışmasın diye ayrı tutulur.
service OrderItemService {
  rpc GetById (OrderItemByIdRequest) returns (OrderItemMessage);
}

message OrderItemByIdRequest {
  string id = 1;
}

message OrderItemMessage {
  string id = 1;
  int32 quantity = 2;
  string unit_price = 3;
}
