syntax = "proto3";

option csharp_namespace = "Warehouse.Grpc";

package warehouse;

// BaseForge.CodeGen tarafından üretildi — StockItem entity'sine diğer servislerin
// salt-okunur gRPC erişimi. Servis adı (StockItemService), C# implementasyon sınıfıyla
// (StockItemGrpcService) çakışmasın diye ayrı tutulur.
service StockItemService {
  rpc GetById (StockItemByIdRequest) returns (StockItemMessage);
}

message StockItemByIdRequest {
  string id = 1;
}

message StockItemMessage {
  string id = 1;
  int32 quantity = 2;
  string location = 3;
}
